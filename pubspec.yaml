name: webview_master_app
description: A feature-rich Flutter WebView application with splash screen, onboarding, and permissions.
publish_to: "none"
# version: 1.0.0+1
version: 1.0.7+9

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView
  flutter_inappwebview: ^6.1.5

  # Permissions
  permission_handler: ^11.0.1

  # Local Storage
  shared_preferences: ^2.3.2

  # Network Connectivity
  connectivity_plus: ^6.0.3

  # HTTP Client
  http: ^1.2.0

  # UI
  cupertino_icons: ^1.0.2

  # Local Notification
  flutter_local_notifications: ^19.5.0

  # Firebase Cloud Messaging
  firebase_core: ^3.15.2
  firebase_messaging: ^15.1.3
  url_launcher: ^6.3.2
  dio: ^5.9.0
  open_file: ^3.5.10
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  google_sign_in: ^6.2.1
  firebase_auth: ^5.7.0
  flutter_launcher_icons: ^0.14.4
  geolocator: ^14.0.2
  change_app_package_name: ^1.5.0
  share_plus: ^10.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^3.0.0

  # App Icon Generator
  # Splash Screen Generator
  flutter_native_splash: ^2.4.4

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#EB2527"
  adaptive_icon_foreground: "assets/images/logo.png"



  # Flutter Native Splash Configuration
flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  android: true
  ios: true
  fullscreen: true
  ios_content_mode: center

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/onboarding/

  # Fonts (optional - uncomment to add custom fonts)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
